<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradFav" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="100" height="100" fill="#050816"/>
    <g transform="translate(20, 20)">
        <!-- PCB traces -->
        <path d="M 10 10 L 50 10 L 50 30 L 10 30 L 10 50" stroke="url(#gradFav)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Pads -->
        <circle cx="10" cy="10" r="3" fill="#00D9FF"/>
        <circle cx="50" cy="10" r="3" fill="#00D9FF"/>
        <circle cx="50" cy="30" r="3" fill="#3B82F6"/>
        <circle cx="10" cy="50" r="3" fill="#00F5FF"/>
    </g>
</svg>
