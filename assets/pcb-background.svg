<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
        <pattern id="pcbGrid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5"/>
        </pattern>
        <linearGradient id="tracePath1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.1" />
            <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.1" />
        </linearGradient>
    </defs>
    
    <!-- Grid background -->
    <rect width="1000" height="1000" fill="url(#pcbGrid)"/>
    
    <!-- PCB traces -->
    <path d="M 100 100 L 300 100 L 300 200 L 500 200 L 500 400 L 700 400" stroke="url(#tracePath1)" stroke-width="3" fill="none"/>
    <path d="M 200 50 L 200 300 L 400 300 L 400 600" stroke="url(#tracePath1)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 600 150 L 800 150 L 800 500 L 900 500" stroke="url(#tracePath1)" stroke-width="2.5" fill="none" opacity="0.7"/>
    
    <!-- Connection points -->
    <circle cx="100" cy="100" r="4" fill="#00D9FF" opacity="0.5"/>
    <circle cx="300" cy="100" r="3" fill="#00D9FF" opacity="0.4"/>
    <circle cx="300" cy="200" r="3" fill="#3B82F6" opacity="0.4"/>
    <circle cx="500" cy="200" r="4" fill="#00D9FF" opacity="0.5"/>
    <circle cx="500" cy="400" r="3" fill="#3B82F6" opacity="0.4"/>
    <circle cx="700" cy="400" r="3" fill="#00F5FF" opacity="0.5"/>
</svg>
